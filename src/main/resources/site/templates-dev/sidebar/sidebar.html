<div class="side-nav-title">
    <p>BitSymphony</p>
    <!-- <i class="bi bi-arrow-left-right"></i> -->
</div>
<div class="separator"></div>
<div class="side-nav-links" x-data="sidebar()">
    <ul>
        <li class="side-nav-link" :class="{ 'active': activeTab === '/dashboard' }">
            <div class="d-flex align-items-center">
                <i class="fa-solid fa-house"></i>
                <a href="/dashboard" class="mx-3">Dashboard</a>
            </div>
        </li>

        <li class="side-nav-link" :class="{ 'active': activeTab === '/codingtool' }">
            <div class="d-flex align-items-center">
                <i class="fa-solid fa-code"></i>
                <a href="/codingtool" class="mx-3">Coding Tool</a>
            </div>
        </li>

        <li class="side-nav-link" :class="{ 'active': activeTab === '/test-cases' }">
            <div class="side-nav-link-parent"
                @click="toggleGroup('test-cases'); $animateCaret($refs.testCasesCaret, openTabs['test-cases'])">
                <div class="d-flex align-items-center">
                    <i class="fa-solid fa-file"></i>
                    <p class="mx-3">Test Cases</p>
                </div>
                <i class="bi bi-chevron-right" x-ref="testCasesCaret"></i>
            </div>
            <div class="side-nav-child-links" x-show="openTabs['test-cases']" x-collapse x-cloak>
                <a href="/test-cases-files" :class="{ 'fw-bold': currentPath === '/test-cases-files' }">
                    Test Case Files
                </a>
            </div>
        </li>

        <li class="side-nav-link" :class="{ 'active': activeTab === '/tutorials' }">
            <div class="side-nav-link-parent"
                @click="toggleGroup('tutorials'); $animateCaret($refs.tutorialsCaret, openTabs['tutorials'])">
                <div class="d-flex align-items-center">
                    <i class="fa-solid fa-book"></i>
                    <p class="mx-3">Tutorials</p>
                </div>
                <i class="bi bi-chevron-right" x-ref="tutorialsCaret"></i>
            </div>
            <div class="side-nav-child-links" x-show="openTabs['tutorials']" x-collapse x-cloak>
                <a href="/tutorials/server-io" :class="{ 'fw-bold': currentPath.includes('/server-io') }">Server I/O</a>
                <a href="/tutorials/file-io" :class="{ 'fw-bold': currentPath.includes('/file-io') }">File I/O</a>
                <a href="/tutorials/data-structures" :class="{ 'fw-bold': currentPath.includes('/data-structures') }">Data Structures</a>
                <a href="/tutorials/algorithms" :class="{ 'fw-bold': currentPath.includes('/algorithms') }">Algorithms</a>
                <a href="/tutorials/java-code" :class="{ 'fw-bold': currentPath.includes('/java-code') }">Java Code</a>
                <a href="/tutorials/backend-engineering" :class="{ 'fw-bold': currentPath.includes('/backend-engineering') }">Backend Engineering</a>
                <a href="/tutorials/frontend-engineering" :class="{ 'fw-bold': currentPath.includes('/frontend-engineering') }">Frontend Engineering</a>
                <a href="/tutorials/proompt-engineering" :class="{ 'fw-bold': currentPath.includes('/proompt-engineering') }">Prompt Engineering</a>
            </div>
        </li>

        <li class="side-nav-link" :class="{ 'active': activeTab === '/configuration' }">
            <div class="side-nav-link-parent"
                @click="toggleGroup('configuration'); $animateCaret($refs.configurationCaret, openTabs['configuration'])">
                <div class="d-flex align-items-center">
                    <i class="fa-solid fa-gear"></i>
                    <p class="mx-3">Configuration</p>
                </div>
                <i class="bi bi-chevron-right" x-ref="configurationCaret"></i>
            </div>
            <div class="side-nav-child-links" x-show="openTabs['configuration']" x-collapse x-cloak>
                <a href="/configuration/app-settings" :class="{ 'fw-bold': currentPath.includes('/app-settings') }">App Settings</a>
                <a href="/configuration/site-settings" :class="{ 'fw-bold': currentPath.includes('/site-settings') }">Site Settings</a>
            </div>
        </li>
    </ul>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        // 1. Animation Helper (unchanged)
        Alpine.magic('animateCaret', () => (el, isOpen) => {
            if (!el) return;
            anime({
                targets: el,
                rotate: isOpen ? 90 : 0,
                duration: 300,
                easing: 'easeInOutQuad'
            });
        });

        // 2. The Sidebar Logic
        Alpine.data('sidebar', () => ({
            activeTab: '',     // Controls which main group is highlighted
            openTabs: {},      // Controls which accordion is expanded
            currentPath: window.location.pathname, // Helper for child link highlighting

            init() {
                // Determine active state based on URL
                const path = window.location.pathname;
                
                // Split the URL: "/tutorials/server-io" -> ["", "tutorials", "server-io"]
                const segments = path.split('/');
                const rootSegment = segments[1]; // "dashboard", "tutorials", etc.

                // Logic to set active tab and open accordion
                if (rootSegment === 'dashboard') {
                    this.activeTab = '/dashboard';
                } 
                else if (rootSegment === 'codingtool') {
                    this.activeTab = '/codingtool';
                } 
                // Handle "Test Cases" (Url might be /test-cases-files, which maps to 'test-cases' group)
                else if (rootSegment.startsWith('test-cases')) {
                    this.activeTab = '/test-cases';
                    this.openTabs['test-cases'] = true;
                } 
                else if (rootSegment === 'tutorials') {
                    this.activeTab = '/tutorials';
                    this.openTabs['tutorials'] = true;
                } 
                else if (rootSegment === 'configuration') {
                    this.activeTab = '/configuration';
                    this.openTabs['configuration'] = true;
                }

                // Handle Initial Caret Animation
                this.$nextTick(() => {
                    if (this.openTabs['test-cases']) this.$animateCaret(this.$refs.testCasesCaret, true);
                    if (this.openTabs['tutorials']) this.$animateCaret(this.$refs.tutorialsCaret, true);
                    if (this.openTabs['configuration']) this.$animateCaret(this.$refs.configurationCaret, true);
                });
            },

            toggleGroup(group) {
                // Close others (Accordion behavior)
                Object.keys(this.openTabs).forEach(k => {
                    if (k !== group) this.openTabs[k] = false;
                });
                // Toggle clicked
                this.openTabs[group] = !this.openTabs[group];
            }
        }));
    });
</script>
